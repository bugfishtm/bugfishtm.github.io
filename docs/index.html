  <main class="full-bleed">

    <!-- HERO -->
    <section id="hero">
      <canvas id="matrix-canvas"></canvas>
      <div class="hero-fade"></div>
      <div class="hero-inner">
        <div class="hero-left">
          <div class="hero-eyebrow">// SYSTEM IDENTIFIED</div>
          <h1 class="glitch" data-text="BUGFISH">BUGFISH</h1>
          <div class="hero-tagline" id="hero-tagline"></div>
          <p class="hero-desc" id="hero-desc"></p>
          <div class="hero-pills" id="hero-pills"></div>
          <div id="music-player-container"></div>
          <div class="hero-actions">
            <a href="https://bugfish.eu" target="_blank" rel="noopener" class="btn">Website</a>
            <a href="https://github.com/bugfishtm" target="_blank" rel="noopener" class="btn outline">GitHub ↗</a>
          </div>
        </div>
        <div class="hero-right">
          <div class="terminal-window" id="zork-terminal">
            <div class="term-titlebar">
              <div class="term-dots">
                <span class="term-dot close"></span>
                <span class="term-dot min"></span>
                <span class="term-dot max"></span>
              </div>
              <span class="term-title-text">cake.exe</span>
            </div>
            <div class="term-body">
              <div id="game-output" class="game-output"></div>
              <div class="game-input-line">
                <span class="game-prompt">&gt;&nbsp;</span>
                <input type="text" id="game-input" class="game-input"
                       autocomplete="off" spellcheck="false" placeholder="type 'help'"
                       aria-label="Game command input">
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="home-wrap">

      <!-- NEWS -->
      <section id="news">
        <div class="section-header">
          <h2 class="section-title">// news.feed<span class="blink">_</span></h2>
          <div class="section-line"></div>
        </div>
        <div class="news-list" id="news-list"></div>
        <div class="pagination" id="news-pagination"></div>
      </section>

      <!-- ABOUT -->
      <section id="about">
        <div class="section-header">
          <h2 class="section-title">// about<span class="blink">_</span></h2>
          <div class="section-line"></div>
        </div>
        <div class="about-grid" id="about-container"></div>
      </section>

      <!-- UPTIME COUNTERS -->
      <section id="counters">
        <div class="section-header">
          <h2 class="section-title">// system.uptime<span class="blink">_</span></h2>
          <div class="section-line"></div>
        </div>
        <div class="counters-grid" id="counters-grid"></div>
      </section>

    </div>
