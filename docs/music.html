<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting…</title>
  <meta name="color-scheme" content="dark" />
  <style>
    :root {
      --bg: #120c08;
      --bg-2: #1a100b;
      --surface: rgba(33, 20, 13, 0.92);
      --surface-2: rgba(47, 28, 18, 0.96);
      --border: rgba(255, 179, 102, 0.14);
      --text: #fff3e8;
      --muted: #d1ab8d;
      --accent: #ff8a1f;
      --accent-2: #ffb347;
      --accent-soft: rgba(255, 138, 31, 0.14);
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.5);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 138, 31, 0.22), transparent 32%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
      overflow: hidden;
    }

    .card {
      width: min(100%, 560px);
      background: linear-gradient(180deg, var(--surface-2), var(--surface));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px;
      position: relative;
      backdrop-filter: blur(14px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-2);
      font-size: 14px;
      letter-spacing: 0.02em;
      margin-bottom: 18px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 0 rgba(255, 138, 31, 0.8);
      animation: pulse 1.8s infinite;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    .url-box {
      margin-top: 22px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 179, 102, 0.12);
      word-break: break-word;
      color: #ffd7b3;
      font-size: 0.95rem;
    }

    .progress-wrap {
      margin-top: 24px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .progress {
      height: 10px;
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(255, 179, 102, 0.08);
    }

    .bar {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 24px rgba(255, 138, 31, 0.38);
      transition: width 1s linear;
    }

    .actions {
      margin-top: 22px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform .18s ease, opacity .18s ease, background .18s ease;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn-primary {
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
      color: #2a1200;
      font-weight: 700;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border: 1px solid rgba(255, 179, 102, 0.12);
    }

    .hint {
      margin-top: 14px;
      font-size: 0.84rem;
      color: #b99072;
    }

    code {
      color: #ffd7b3;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255, 138, 31, 0.8); }
      70% { box-shadow: 0 0 0 12px rgba(255, 138, 31, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 138, 31, 0); }
    }

    @media (max-width: 640px) {
      .card { padding: 24px; border-radius: 18px; }
      .actions { flex-direction: column; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="card" aria-live="polite">
    <div class="badge"><span class="dot" aria-hidden="true"></span> Redirect in progress</div>
    <h1>Please wait…</h1>
    <p id="message">You are being redirected shortly.</p>

    <div class="url-box" id="targetUrl">No target URL set.</div>

    <div class="progress-wrap">
      <div class="progress-meta">
        <span>Redirecting</span>
        <span><span id="countdown">5</span>s</span>
      </div>
      <div class="progress" aria-hidden="true">
        <div class="bar" id="bar"></div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="goNow">Go now</button>
      <button class="btn btn-secondary" id="cancelRedirect">Cancel</button>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const target = 'https://bugfishtm.github.io';
    const delay = Math.max(1, Math.min(30, Number(params.get('delay')) || 5));

    const targetUrl = document.getElementById('targetUrl');
    const message = document.getElementById('message');
    const countdownEl = document.getElementById('countdown');
    const bar = document.getElementById('bar');
    const goNowBtn = document.getElementById('goNow');
    const cancelBtn = document.getElementById('cancelRedirect');

    let remaining = delay;
    let cancelled = false;

    targetUrl.textContent = target;
    message.textContent = `You will be redirected in ${delay} second${delay === 1 ? '' : 's'}.`;
    countdownEl.textContent = remaining;

    const redirect = () => {
      if (!cancelled) window.location.href = target;
    };

    const updateProgress = () => {
      const progress = ((delay - remaining) / delay) * 100;
      bar.style.width = `${Math.min(100, Math.max(0, progress))}%`;
    };

    updateProgress();
    bar.style.transitionDuration = `${delay}s`;
    requestAnimationFrame(() => {
      bar.style.width = '100%';
    });

    const timer = setInterval(() => {
      remaining -= 1;
      countdownEl.textContent = Math.max(0, remaining);
      updateProgress();

      if (remaining <= 0) {
        clearInterval(timer);
        redirect();
      }
    }, 1000);

    goNowBtn.addEventListener('click', redirect);

    cancelBtn.addEventListener('click', () => {
      cancelled = true;
      clearInterval(timer);
      message.textContent = 'Automatic redirect cancelled.';
      countdownEl.textContent = '0';
      bar.style.width = '0%';
      goNowBtn.textContent = 'Open link';
      cancelBtn.disabled = true;
      cancelBtn.style.opacity = '.5';
    });
  </script>
</body>
</html>
